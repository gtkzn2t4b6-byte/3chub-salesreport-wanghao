<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>价格变动 × 销量影响 — 3CHUB</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
  --text: #e1e4ea; --muted: #6b7280;
  --red: #ef4444; --green: #22c55e; --blue: #3b82f6;
  --orange: #f59e0b; --purple: #8b5cf6; --cyan: #06b6d4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header .date { color: var(--muted); font-size: 12px; }

.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 20px; }
.s { background: var(--card); border:1px solid var(--border); border-radius: 8px; padding: 14px; text-align: center; }
.s .label { font-size: 11px; color: var(--muted); }
.s .value { font-size: 26px; font-weight: 800; }
.s .sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
.s.danger .value { color: var(--red); }
.s.warn .value { color: var(--orange); }
.s.info .value { color: var(--blue); }
.s.good .value { color: var(--green); }

.chart-card { background: var(--card); border:1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 20px; }
.chart-card h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.chart-wrap { height: 400px; position: relative; }

.controls { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
.controls select, .controls input { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 10px; font-size: 12px; }
.controls label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
.sort-btn { background: var(--border); border: none; color: var(--text); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.sort-btn.active { background: var(--blue); }

.table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th { background: var(--card); padding: 10px 8px; text-align: left; white-space: nowrap; border-bottom: 2px solid var(--border); position: sticky; top: 0; }
tbody td { padding: 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody tr:hover { background: rgba(255,255,255,0.03); }
.badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.badge-up { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-down { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-pending { background: rgba(245,158,11,0.15); color: var(--orange); }
.neg { color: var(--red); }
.pos { color: var(--green); }
.sev-3 { background: rgba(220,38,38,0.08); }
.sev-2 { background: rgba(245,158,11,0.06); }

.footer { text-align: center; color: var(--muted); font-size: 11px; padding: 12px; }

.info-note { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--muted); margin-bottom: 14px; }
.info-note span { color: var(--blue); font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>价格变动 &times; 销量影响分析</h1>
    <div class="date">数据截止: 2026-06-29 | 3CHUB</div>
  </div>

  <div class="stats" id="statsCards"></div>

  <div class="chart-card">
    <h2>调价幅度 vs 销量变化 (散点图)</h2>
    <div class="chart-wrap"><canvas id="scatterChart"></canvas></div>
  </div>

  <div class="controls">
    <label>品牌: <select id="brandFilter"><option value="">全部</option></select></label>
    <label>方向: <select id="dirFilter"><option value="">全部</option><option value="up">涨价</option><option value="down">降价</option></select></label>
    <label>价位: <select id="tierFilter"><option value="">全部</option></select></label>
    <div style="flex:1"></div>
    <span style="font-size:12px;color:var(--muted)">排序:</span>
    <button class="sort-btn active" data-sort="impact">冲击最大</button>
    <button class="sort-btn" data-sort="elastic">弹性最高</button>
    <button class="sort-btn" data-sort="price">涨幅最大</button>
  </div>

  <div class="info-note" id="infoNote"></div>
  <div class="table-wrap" id="tableWrap"></div>

  <div class="footer">3CHUB &middot; 价格变动&amp;销量影响分析 &middot; 2026-06-25</div>
</div>

<script>
const DATA = [{"brand": "TECNO", "model": "SPARK 50-KN4(128+4)", "short_model": "SPARK 50-KN4(128+4)", "total_qty": 5968, "daily_avg": 157.1, "price_tier": "10w", "turnover_days": 0, "current_price": 183700.0, "ver_date": "2026-06-29", "from_price": 173200.0, "to_price": 183700.0, "price_pct": 6.1, "before_avg": 157.1, "after_avg": 155.0, "sales_pct": -1.3, "elasticity": 0.21, "severity": 2.0, "direction": "up"}, {"brand": "INFINIX", "model": "SMART20-X6840(128+4)", "short_model": "SMART20-X6840(128+4)", "total_qty": 2566, "daily_avg": 54.6, "price_tier": "10w", "turnover_days": 0, "current_price": 162900.0, "ver_date": "2026-06-29", "from_price": 154800.0, "to_price": 162900.0, "price_pct": 5.2, "before_avg": 54.7, "after_avg": 48.0, "sales_pct": -12.2, "elasticity": 2.35, "severity": 7.0, "direction": "up"}, {"brand": "XIAOMI", "model": "REDMI A7PRO(128+4)", "short_model": "REDMI A7PRO(128+4)", "total_qty": 1897, "daily_avg": 38.7, "price_tier": "10w", "turnover_days": 0, "current_price": 149900.0, "ver_date": "2026-06-29", "from_price": 149400.0, "to_price": 149900.0, "price_pct": 0.3, "before_avg": 38.4, "after_avg": 54.0, "sales_pct": 40.6, "elasticity": 135.33, "severity": 16.0, "direction": "up"}, {"brand": "XIAOMI", "model": "REDMI 15C(128+4)", "short_model": "REDMI 15C(128+4)", "total_qty": 1580, "daily_avg": 32.2, "price_tier": "10w", "turnover_days": 0, "current_price": 167900.0, "ver_date": "2026-06-29", "from_price": 159800.0, "to_price": 167900.0, "price_pct": 5.1, "before_avg": 32.3, "after_avg": 31.0, "sales_pct": -4.0, "elasticity": 0.78, "severity": 1.0, "direction": "up"}, {"brand": "XIAOMI", "model": "REDMI 15C(128+6)", "short_model": "REDMI 15C(128+6)", "total_qty": 1207, "daily_avg": 24.6, "price_tier": "10w", "turnover_days": 0, "current_price": 181100.0, "ver_date": "2026-06-29", "from_price": 169500.0, "to_price": 181100.0, "price_pct": 6.8, "before_avg": 24.9, "after_avg": 12.0, "sales_pct": -51.8, "elasticity": 7.62, "severity": 13.0, "direction": "up"}, {"brand": "ITEL", "model": "A100C-A6611L(64+3)", "short_model": "A100C-A6611L(64+3)", "total_qty": 1931, "daily_avg": 39.4, "price_tier": "10w", "turnover_days": 0, "current_price": 105200.0, "ver_date": "2026-06-29", "from_price": 99900.0, "to_price": 105200.0, "price_pct": 5.3, "before_avg": 39.3, "after_avg": 45.0, "sales_pct": 14.5, "elasticity": 2.74, "severity": 6.0, "direction": "up"}, {"brand": "ITEL", "model": "A100C-A6611L(64+2)", "short_model": "A100C-A6611L(64+2)", "total_qty": 1637, "daily_avg": 33.4, "price_tier": "10w", "turnover_days": 0, "current_price": 105200.0, "ver_date": "2026-06-29", "from_price": 95900.0, "to_price": 105200.0, "price_pct": 9.7, "before_avg": 34.1, "after_avg": 1.0, "sales_pct": -97.1, "elasticity": 10.01, "severity": 32.0, "direction": "up"}, {"brand": "ITEL", "model": "CITY 200-C681L(128+4)", "short_model": "CITY 200-C681L(128+4)", "total_qty": 1275, "daily_avg": 26.0, "price_tier": "10w", "turnover_days": 0, "current_price": 145900.0, "ver_date": "2026-06-29", "from_price": 139900.0, "to_price": 145900.0, "price_pct": 4.3, "before_avg": 26.1, "after_avg": 21.0, "sales_pct": -19.5, "elasticity": 4.53, "severity": 5.0, "direction": "up"}, {"brand": "ITEL", "model": "A200PLUS-A676L(128+3)", "short_model": "A200PLUS-A676L(128+3)", "total_qty": 732, "daily_avg": 15.6, "price_tier": "10w", "turnover_days": 0, "current_price": 146400.0, "ver_date": "2026-06-29", "from_price": 129900.0, "to_price": 146400.0, "price_pct": 12.7, "before_avg": 15.8, "after_avg": 3.0, "sales_pct": -81.0, "elasticity": 6.38, "severity": 13.0, "direction": "up"}, {"brand": "VIVO", "model": "Y31D(128+6)", "short_model": "Y31D(128+6)", "total_qty": 203, "daily_avg": 4.6, "price_tier": "30w", "turnover_days": 0, "current_price": 349800.0, "ver_date": "2026-06-29", "from_price": 269800.0, "to_price": 349800.0, "price_pct": 29.7, "before_avg": 4.7, "after_avg": 2.0, "sales_pct": -57.4, "elasticity": 1.93, "severity": 3.0, "direction": "up"}, {"brand": "SAMSUNG", "model": "GALAXY A06-A065F(64+4)", "short_model": "GALAXY A06-A065F(64+4)", "total_qty": 968, "daily_avg": 19.8, "price_tier": "10w", "turnover_days": 0, "current_price": 122600.0, "ver_date": "2026-06-29", "from_price": 132600.0, "to_price": 122600.0, "price_pct": -7.5, "before_avg": 19.1, "after_avg": 50.0, "sales_pct": 161.8, "elasticity": 21.57, "severity": 32.0, "direction": "down"}, {"brand": "SAMSUNG", "model": "GALAXY A17-A175F(128+6)", "short_model": "GALAXY A17-A175F(128+6)", "total_qty": 528, "daily_avg": 10.8, "price_tier": "20w", "turnover_days": 0, "current_price": 255500.0, "ver_date": "2026-06-29", "from_price": 257500.0, "to_price": 255500.0, "price_pct": -0.8, "before_avg": 10.8, "after_avg": 10.0, "sales_pct": -7.4, "elasticity": 9.25, "severity": 1.0, "direction": "down"}, {"brand": "SAMSUNG", "model": "GALAXY A17-A175F(128+4)", "short_model": "GALAXY A17-A175F(128+4)", "total_qty": 508, "daily_avg": 10.4, "price_tier": "20w", "turnover_days": 0, "current_price": 235100.0, "ver_date": "2026-06-29", "from_price": 237100.0, "to_price": 235100.0, "price_pct": -0.8, "before_avg": 10.2, "after_avg": 16.0, "sales_pct": 56.9, "elasticity": 71.12, "severity": 6.0, "direction": "down"}, {"brand": "HONOR", "model": "PLAY10(64+3)", "short_model": "PLAY10(64+3)", "total_qty": 607, "daily_avg": 12.4, "price_tier": "10w", "turnover_days": 0, "current_price": 104153.8, "ver_date": "2026-06-29", "from_price": 117000, "to_price": 104153.8, "price_pct": -11.0, "before_avg": 12.2, "after_avg": 22.0, "sales_pct": 80.3, "elasticity": 7.3, "severity": 10.0, "direction": "down"}, {"brand": "HONOR", "model": "X5CPLUS(128+4)", "short_model": "X5CPLUS(128+4)", "total_qty": 85, "daily_avg": 2.2, "price_tier": "10w", "turnover_days": 0, "current_price": 155660.0, "ver_date": "2026-06-29", "from_price": 155700, "to_price": 155660.0, "price_pct": -0.0, "before_avg": 2.2, "after_avg": 0.0, "sales_pct": -100.0, "elasticity": null, "severity": 2.0, "direction": "down"}, {"brand": "OPPO", "model": "A6X(64+4)", "short_model": "A6X(64+4)", "total_qty": 141, "daily_avg": 3.6, "price_tier": "10w", "turnover_days": 0, "current_price": 189900.0, "ver_date": "2026-06-29", "from_price": 219900.0, "to_price": 189900.0, "price_pct": -13.6, "before_avg": 3.6, "after_avg": 4.0, "sales_pct": 11.1, "elasticity": 0.82, "severity": 0.0, "direction": "down"}, {"brand": "OPPO", "model": "A6X(128+4)", "short_model": "A6X(128+4)", "total_qty": 72, "daily_avg": 2.3, "price_tier": "20w", "turnover_days": 0, "current_price": 224900.0, "ver_date": "2026-06-29", "from_price": 253900.0, "to_price": 224900.0, "price_pct": -11.4, "before_avg": 2.3, "after_avg": 2.0, "sales_pct": -13.0, "elasticity": 1.14, "severity": 0.0, "direction": "down"}];

const changed = DATA.filter(function(d){ return d.direction; });
const upUp   = changed.filter(function(d){ return d.direction==='up' && d.sales_pct>0; }).length;
const upDown = changed.filter(function(d){ return d.direction==='up' && d.sales_pct<0; }).length;
const downUp   = changed.filter(function(d){ return d.direction==='down' && d.sales_pct>0; }).length;
const downDown = changed.filter(function(d){ return d.direction==='down' && d.sales_pct<0; }).length;
var filtered = changed.slice();

var scatterChart;
var currentSort = 'impact';

function fmtN(v){ return v==null||isNaN(v)?'--':v.toLocaleString(); }
function fmtP(v){ return v==null||isNaN(v)?'--':(v>0?'+':'')+v.toFixed(1)+'%'; }
function fmtPrice(v){ return v==null||isNaN(v)?'--':'₦'+v.toLocaleString(); }

function severityClass(s){
  if(!s||s===0) return '';
  return s>=200?'sev-3':(s>=50?'sev-2':'');
}

function renderStats(){
  var html = '';
  html += '<div class="s danger"><div class="label">涨价 → 销量降</div><div class="value">'+upDown+'</div><div class="sub">100%涨价导致下降</div></div>';
  html += '<div class="s good"><div class="label">降价 → 销量升</div><div class="value">'+downUp+'</div><div class="sub">有效降价</div></div>';
  html += '<div class="s info"><div class="label">涨价 → 销量升</div><div class="value">'+upUp+'</div><div class="sub">逆势增长</div></div>';
  html += '<div class="s warn"><div class="label">降价 → 销量降</div><div class="value">'+downDown+'</div><div class="sub">市场下行</div></div>';
  document.getElementById('statsCards').innerHTML = html;
}

function renderChart(){
  var ctx = document.getElementById('scatterChart').getContext('2d');
  if(scatterChart) scatterChart.destroy();

  var upChanged = changed.filter(function(d){ return d.direction==='up'; });
  var downChanged = changed.filter(function(d){ return d.direction==='down'; });

  function makeDataset(ary, color, label, shape){
    var maxSize = 14;
    var sizes = ary.map(function(d){ return Math.max(4, Math.min(maxSize, Math.sqrt(d.total_qty)/3)); });
    return {
      label: label,
      data: ary.map(function(d){ return {x:d.price_pct*(d.direction==='down'?-1:1), y:d.sales_pct||0, model:d.model, brand:d.brand}; }),
      backgroundColor: color,
      borderColor: color,
      borderWidth: 1,
      pointRadius: sizes,
      pointHoverRadius: sizes.map(function(s){ return s+3; }),
      pointStyle: shape||'circle'
    };
  }

  var datasets = [];
  if(upChanged.length) datasets.push(makeDataset(upChanged, '#ef4444', '涨价', 'triangle'));
  if(downChanged.length) datasets.push(makeDataset(downChanged, '#22c55e', '降价', 'circle'));

  scatterChart = new Chart(ctx, {
    type: 'scatter',
    data: { datasets: datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#e1e4ea', font: { size: 11 }, usePointStyle: true, padding: 16 } },
        tooltip: {
          callbacks: {
            label: function(c){
              var d = c.raw;
              return d.brand+' '+d.model+' | 调价: '+fmtP(d.x)+' | 销量: '+fmtP(d.y);
            }
          }
        }
      },
      scales: {
        x: {
          title: { display: true, text: '调价幅度 (%)', color: '#6b7280' },
          grid: { color: 'rgba(42,45,58,0.5)' },
          ticks: { color: '#6b7280', callback: function(v){return fmtP(v);} }
        },
        y: {
          title: { display: true, text: '销量变化 (%)', color: '#6b7280' },
          grid: { color: 'rgba(42,45,58,0.5)' },
          ticks: { color: '#6b7280', callback: function(v){return fmtP(v);} },
          afterBuildTicks: function(axis){ if(axis.ticks.indexOf(0)<0) axis.ticks.push({value:0, label:'0'}); }
        }
      }
    }
  });
}

function renderTable(){
  var rows = filtered;

  // Sort
  if(currentSort==='impact') rows.sort(function(a,b){ return (b.severity||0)-(a.severity||0); });
  else if(currentSort==='elastic') rows.sort(function(a,b){ return (b.elasticity||0)-(a.elasticity||0); });
  else if(currentSort==='price') rows.sort(function(a,b){ return Math.abs(b.price_pct||0)-Math.abs(a.price_pct||0); });

  var html = '<table><thead><tr>';
  html += '<th>品牌</th><th>型号</th><th>总销量</th><th>日均</th><th>价位</th><th>周转天</th>';
  html += '<th>调价日期</th><th>变价前</th><th>变价后</th><th>幅度</th>';
  html += '<th>变价前日均</th><th>变价后日均</th><th>销量变化</th>';
  html += '<th>弹性</th><th>影响台数</th><th>方向</th>';
  html += '</tr></thead><tbody>';

  rows.forEach(function(d){
    var cls = severityClass(d.severity);

    html += '<tr class="'+cls+'">';
    html += '<td><b>'+d.brand+'</b></td>';
    html += '<td>'+d.model+'</td>';
    html += '<td>'+fmtN(d.total_qty)+'</td>';
    html += '<td>'+fmtN(d.daily_avg)+'</td>';
    html += '<td>'+d.price_tier+'</td>';
    html += '<td>'+fmtN(d.turnover_days)+'</td>';
    html += '<td>'+d.ver_date+'</td>';
    html += '<td>'+fmtPrice(d.from_price)+'</td>';
    html += '<td>'+fmtPrice(d.to_price)+'</td>';
    html += '<td><span class="'+(d.direction==='up'?'neg':'pos')+'">'+fmtP(d.price_pct*(d.direction==='up'?1:-1))+'</span></td>';
    html += '<td>'+fmtN(d.before_avg)+'</td>';
    html += '<td>'+fmtN(d.after_avg)+'</td>';
    html += '<td><span class="'+(d.sales_pct!=null&&d.sales_pct>0?'pos':'neg')+'">'+fmtP(d.sales_pct)+'</span></td>';
    html += '<td>'+fmtN(d.elasticity)+'</td>';
    html += '<td>'+fmtN(d.severity>0?d.severity:null)+'</td>';
    html += '<td>';
    if(d.direction==='up') html += '<span class="badge badge-up">涨价</span>';
    else if(d.direction==='down') html += '<span class="badge badge-down">降价</span>';
    html += '</td>';
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;

  // Info note
  document.getElementById('infoNote').innerHTML = '共 <span>'+changed.length+'</span> 个调价型号（对比基准：2026-05-21 价格表）。';
}

function applyFilters(){
  var b = document.getElementById('brandFilter').value;
  var d = document.getElementById('dirFilter').value;
  var t = document.getElementById('tierFilter').value;
  filtered = DATA.filter(function(r){
    if(b && r.brand!==b) return false;
    if(d && r.direction!==d) return false;
    if(t && r.price_tier!==t) return false;
    return true;
  });
  renderTable();
}

function populateFilters(){
  var brands = [];
  var tiers = [];
  DATA.forEach(function(d){
    if(brands.indexOf(d.brand)<0) brands.push(d.brand);
    if(tiers.indexOf(d.price_tier)<0) tiers.push(d.price_tier);
  });
  brands.sort();
  tiers.sort(function(a,b){
    var o=['10w','20w','30w','100w以上'];
    return o.indexOf(a)-o.indexOf(b);
  });

  var bf = document.getElementById('brandFilter');
  brands.forEach(function(b){ bf.innerHTML += '<option value="'+b+'">'+b+'</option>'; });
  var tf = document.getElementById('tierFilter');
  tiers.forEach(function(t){ tf.innerHTML += '<option value="'+t+'">'+t+'</option>'; });
}

function init(){
  populateFilters();
  renderStats();
  renderChart();
  renderTable();

  document.getElementById('brandFilter').addEventListener('change', applyFilters);
  document.getElementById('dirFilter').addEventListener('change', applyFilters);
  document.getElementById('tierFilter').addEventListener('change', applyFilters);

  document.querySelectorAll('.sort-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.sort-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      renderTable();
    });
  });
}

init();
</script>
</body>
</html>
