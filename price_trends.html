<style>
:root {
  --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
  --text: #e1e4ea; --muted: #6b7280;
  --red: #ef4444; --green: #22c55e; --blue: #3b82f6;
  --orange: #f59e0b; --purple: #8b5cf6; --cyan: #06b6d4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header .date { color: var(--muted); font-size: 12px; }

.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 20px; }
.s { background: var(--card); border:1px solid var(--border); border-radius: 8px; padding: 14px; text-align: center; }
.s .label { font-size: 11px; color: var(--muted); }
.s .value { font-size: 26px; font-weight: 800; }
.s .sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
.s.danger .value { color: var(--red); }
.s.warn .value { color: var(--orange); }
.s.info .value { color: var(--blue); }
.s.good .value { color: var(--green); }

.chart-card { background: var(--card); border:1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 20px; }
.chart-card h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.chart-wrap { height: 400px; position: relative; }

.controls { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
.controls select, .controls input { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 10px; font-size: 12px; }
.controls label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
.sort-btn { background: var(--border); border: none; color: var(--text); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.sort-btn.active { background: var(--blue); }

.table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th { background: var(--card); padding: 10px 8px; text-align: left; white-space: nowrap; border-bottom: 2px solid var(--border); position: sticky; top: 0; }
tbody td { padding: 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody tr:hover { background: rgba(255,255,255,0.03); }
.badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.badge-up { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-down { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-pending { background: rgba(245,158,11,0.15); color: var(--orange); }
.neg { color: var(--red); }
.pos { color: var(--green); }
.sev-3 { background: rgba(220,38,38,0.08); }
.sev-2 { background: rgba(245,158,11,0.06); }

.footer { text-align: center; color: var(--muted); font-size: 11px; padding: 12px; }

.info-note { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--muted); margin-bottom: 14px; }
.info-note span { color: var(--blue); font-weight: 600; }
</style>
</head>

<div class="container">

  <div class="controls">

const completed = DATA.filter(function(d){ return !d.pending; });
const pending = DATA.filter(function(d){ return d.pending; });
const upUp = completed.filter(function(d){ return d.direction==='up' && d.sales_pct>0; }).length;
const upDown = completed.filter(function(d){ return d.direction==='up' && d.sales_pct<0; }).length;
const downUp = completed.filter(function(d){ return d.direction==='down' && d.sales_pct>0; }).length;
const downDown = completed.filter(function(d){ return d.direction==='down' && d.sales_pct<0; }).length;
var filtered = DATA.slice();

var scatterChart;
var currentSort = 'impact';

function fmtN(v){ return v==null||isNaN(v)?'--':v.toLocaleString(); }
function fmtP(v){ return v==null||isNaN(v)?'--':(v>0?'+':'')+v.toFixed(1)+'%'; }
function fmtPrice(v){ return v==null||isNaN(v)?'--':'₦'+v.toLocaleString(); }

function severityClass(s){
  if(!s||s===0) return '';
  return s>=200?'sev-3':(s>=50?'sev-2':'');
}

function renderStats(){
  var html = '';
  html += '<div class="s danger"><div class="label">涨价 → 销量降</div><div class="value">'+upDown+'</div><div class="sub">100%涨价导致下降</div></div>';
  html += '<div class="s good"><div class="label">降价 → 销量升</div><div class="value">'+downUp+'</div><div class="sub">有效降价</div></div>';
  html += '<div class="s info"><div class="label">涨价 → 销量升</div><div class="value">'+upUp+'</div><div class="sub">逆势增长</div></div>';
  html += '<div class="s warn"><div class="label">降价 → 销量降</div><div class="value">'+downDown+'</div><div class="sub">市场下行</div></div>';
  document.getElementById('statsCards').innerHTML = html;
}

function renderChart(){
  var ctx = document.getElementById('scatterChart').getContext('2d');
  if(scatterChart) scatterChart.destroy();

  var upCompleted = completed.filter(function(d){ return d.direction==='up'; });
  var downCompleted = completed.filter(function(d){ return d.direction==='down'; });
  var pendingEvents = pending.filter(function(d){ return d.direction==='up' || d.direction==='down'; });

  function makeDataset(ary, color, label, shape, isPending){
    var maxSize = isPending ? 8 : 14;
    var sizes = ary.map(function(d){ return isPending ? 6 : Math.max(4, Math.min(maxSize, Math.sqrt(d.total_qty)/3)); });
    return {
      label: label,
      data: ary.map(function(d){ return {x:d.price_pct*(d.direction==='down'?-1:1), y:d.sales_pct||0, model:d.model, brand:d.brand}; }),
      backgroundColor: isPending ? 'transparent' : color,
      borderColor: color,
      borderWidth: isPending ? 2 : 1,
      pointRadius: sizes,
      pointHoverRadius: sizes.map(function(s){ return s+3; }),
      pointStyle: shape||'circle'
    };
  }

  var datasets = [];
  if(upCompleted.length) datasets.push(makeDataset(upCompleted, '#ef4444', '涨价(已完成)', 'triangle', false));
  if(downCompleted.length) datasets.push(makeDataset(downCompleted, '#22c55e', '降价(已完成)', 'circle', false));
  if(pendingEvents.length) datasets.push(makeDataset(pendingEvents, '#f59e0b', '涨价(待观察)', 'rectRot', true));

  scatterChart = new Chart(ctx, {
    type: 'scatter',
    data: { datasets: datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#e1e4ea', font: { size: 11 }, usePointStyle: true, padding: 16 } },
        tooltip: {
          callbacks: {
            label: function(c){
              var d = c.raw;
              return d.brand+' '+d.model+' | 调价: '+fmtP(d.x)+' | 销量: '+fmtP(d.y);
            }
          }
        }
      },
      scales: {
        x: {
          title: { display: true, text: '调价幅度 (%)', color: '#6b7280' },
          grid: { color: 'rgba(42,45,58,0.5)' },
          ticks: { color: '#6b7280', callback: function(v){return fmtP(v);} }
        },
        y: {
          title: { display: true, text: '销量变化 (%)', color: '#6b7280' },
          grid: { color: 'rgba(42,45,58,0.5)' },
          ticks: { color: '#6b7280', callback: function(v){return fmtP(v);} },
          afterBuildTicks: function(axis){ if(axis.ticks.indexOf(0)<0) axis.ticks.push({value:0, label:'0'}); }
        }
      }
    }
  });
}

function renderTable(){
  var rows = filtered;

  // Sort
  if(currentSort==='impact') rows.sort(function(a,b){ return (b.severity||0)-(a.severity||0); });
  else if(currentSort==='elastic') rows.sort(function(a,b){ return (b.elasticity||0)-(a.elasticity||0); });
  else if(currentSort==='price') rows.sort(function(a,b){ return Math.abs(b.price_pct||0)-Math.abs(a.price_pct||0); });

  var html = '<table><thead><tr>';
  html += '<th>品牌</th><th>型号</th><th>总销量</th><th>日均</th><th>价位</th><th>周转天</th>';
  html += '<th>调价日期</th><th>变价前</th><th>变价后</th><th>幅度</th>';
  html += '<th>变价前日均</th><th>变价后日均</th><th>销量变化</th>';
  html += '<th>弹性</th><th>影响台数</th><th>方向</th>';
  html += '</tr></thead><tbody>';

  rows.forEach(function(d){
    var cls = '';
    if(d.pending) cls = 'sev-2';
    else cls = severityClass(d.severity);

    html += '<tr class="'+cls+'">';
    html += '<td><b>'+d.brand+'</b></td>';
    html += '<td>'+d.model+'</td>';
    html += '<td>'+fmtN(d.total_qty)+'</td>';
    html += '<td>'+fmtN(d.daily_avg)+'</td>';
    html += '<td>'+d.price_tier+'</td>';
    html += '<td>'+fmtN(d.turnover_days)+'</td>';
    html += '<td>'+d.ver_date+'</td>';
    html += '<td>'+fmtPrice(d.from_price)+'</td>';
    html += '<td>'+fmtPrice(d.to_price)+'</td>';
    html += '<td><span class="'+(d.direction==='up'?'neg':'pos')+'">'+fmtP(d.price_pct*(d.direction==='up'?1:-1))+'</span></td>';
    html += '<td>'+fmtN(d.before_avg)+'</td>';
    html += '<td>'+fmtN(d.after_avg)+'</td>';
    html += '<td><span class="'+(d.sales_pct!=null&&d.sales_pct>0?'pos':'neg')+'">'+fmtP(d.sales_pct)+'</span></td>';
    html += '<td>'+fmtN(d.elasticity)+'</td>';
    html += '<td>'+fmtN(d.severity>0?d.severity:null)+'</td>';
    html += '<td>';
    if(d.pending) html += '<span class="badge badge-pending">待观察</span>';
    else if(d.direction==='up') html += '<span class="badge badge-up">涨价</span>';
    else html += '<span class="badge badge-down">降价</span>';
    html += '</td>';
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;

  // Info note
  var cnt = filtered.filter(function(d){return d.pending;}).length;
  document.getElementById('infoNote').innerHTML = '共 <span>'+filtered.length+'</span> 个调价事件，其中 <span>'+cnt+'</span> 个 06-24 最新调价尚无足够销量数据（标注「待观察」）。';
}

function applyFilters(){
  var b = document.getElementById('brandFilter').value;
  var d = document.getElementById('dirFilter').value;
  var t = document.getElementById('tierFilter').value;
  filtered = DATA.filter(function(r){
    if(b && r.brand!==b) return false;
    if(d && r.direction!==d) return false;
    if(t && r.price_tier!==t) return false;
    return true;
  });
  renderTable();
}

function populateFilters(){
  var brands = [];
  var tiers = [];
  DATA.forEach(function(d){
    if(brands.indexOf(d.brand)<0) brands.push(d.brand);
    if(tiers.indexOf(d.price_tier)<0) tiers.push(d.price_tier);
  });
  brands.sort();
  tiers.sort(function(a,b){
    var o=['10w','20w','30w','100w以上'];
    return o.indexOf(a)-o.indexOf(b);
  });

  var bf = document.getElementById('brandFilter');
  brands.forEach(function(b){ bf.innerHTML += '<option value="'+b+'">'+b+'</option>'; });
  var tf = document.getElementById('tierFilter');
  tiers.forEach(function(t){ tf.innerHTML += '<option value="'+t+'">'+t+'</option>'; });
}

function init(){
  populateFilters();
  renderStats();
  renderChart();
  renderTable();

  document.getElementById('brandFilter').addEventListener('change', applyFilters);
  document.getElementById('dirFilter').addEventListener('change', applyFilters);
  document.getElementById('tierFilter').addEventListener('change', applyFilters);

  document.querySelectorAll('.sort-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.sort-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      renderTable();
    });
  });
}

init();
</script>
</body>
</html>
